<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hundir la flota virtual</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section id="pantalla-inicio" class="pantalla activa">
      <div class="panel central">
        <h1>Hundir la flota</h1>
        <p>Elige una opción para comenzar.</p>
        <div class="botones-inicio">
          <button id="btn-crear">Crear nueva partida</button>
          <div class="unirse-grupo">
            <input id="codigo-partida" type="text" placeholder="Código de partida" maxlength="5" />
            <button id="btn-unirse">Unirse a una partida</button>
          </div>
        </div>
      </div>
    </section>

    <section id="pantalla-preparacion" class="pantalla">
      <div class="panel">
        <header class="panel-header">
          <h2>Preparación de la flota</h2>
          <p>Coloca tus barcos en el tablero.</p>
        </header>

        <div class="preparacion-layout">
          <div class="tablero-contenedor">
            <h3>Tu tablero</h3>
            <div id="tablero-preparacion" class="tablero"></div>
          </div>
          <aside class="barra-lateral">
            <div class="lista-barcos">
              <h3>Barcos disponibles</h3>
              <div id="lista-barcos-disponibles" class="lista-barcos-items"></div>
            </div>
            <div class="controles-colocacion">
              <button id="btn-orientacion" class="btn-secundario">Orientación: Horizontal</button>
              <div id="informacion-colocacion" class="info-colocacion">Selecciona un barco y haz clic en el tablero.</div>
            </div>
            <button id="btn-listo" class="btn-principal">Listo</button>
          </aside>
        </div>
      </div>
    </section>

    <section id="pantalla-batalla" class="pantalla">
      <div class="panel">
        <header class="panel-header">
          <h2>Batalla</h2>
          <p id="estado-turno" class="estado-turno">Esperando al rival...</p>
        </header>

        <div class="batalla-layout">
          <div class="tablero-contenedor">
            <h3>Mi flota</h3>
            <div id="tablero-flota" class="tablero"></div>
          </div>
          <div class="tablero-contenedor">
            <h3>Radar</h3>
            <div id="tablero-radar" class="tablero"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
